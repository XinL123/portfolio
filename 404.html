<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Page Not Found | Christus Luo</title>
    <!-- theme boot, BEFORE first paint. The choice survives navigation inside
         the site (home -> about -> playground ...) but NOT a reload: a reload
         restarts the site from the intro lines, so it opens light, matching the
         rest of the reload-resets-everything behaviour. -->
    <script>
      (function () {
        var t = "light";
        try {
          var nav = performance.getEntriesByType("navigation")[0];
          /* a reload starts the whole site over -> forget the choice */
          if (nav && nav.type === "reload") sessionStorage.removeItem("portfolio-theme");
          if (sessionStorage.getItem("portfolio-theme") === "dark") t = "dark";
        } catch (e) {
          /* storage blocked (private mode) — keep the light default */
        }
        document.documentElement.dataset.theme = t;
      })();
    </script>
    <!-- fonts load in parallel with the CSS (was an @import inside styles.css,
         which serialized: CSS download -> font-CSS download -> font download) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Frijole&family=Gaegu:wght@300;400;700&display=swap" />
    <link rel="stylesheet" href="styles.css?v=202607211h" />
  </head>
  <body data-page="home">
    <script>
      /* Mirror the theme onto <body> before ANY body content is parsed:
         almost every dark rule is written as body[data-theme="dark"], and
         <body> does not exist yet when the <head> script runs. Without this
         those rules only land once script.js executes — one light frame. */
      document.body.dataset.theme = document.documentElement.dataset.theme;
    </script>
    <header class="site-header">
      <a class="brand-mark" href="index.html" aria-label="Christus Luo home">
        <img class="site-logo" src="assets/system/header-logo-cutout.png" alt="" />
      </a>
      <button class="menu-toggle" type="button" aria-label="Open navigation" aria-expanded="false">Menu</button>
      <nav class="main-nav" aria-label="Main navigation">
        <a href="index.html#work">Work</a>
        <a href="about.html">About</a>
        <a href="resume.html">Resume</a>
        <a href="playground.html">Playground</a>
        <a class="nav-connect" href="mailto:hello@christusluo.com">Let's Connect</a>
        <span class="menu-socials" aria-label="Social links">
          <a href="#" aria-label="Github">Github</a>
          <a href="https://www.linkedin.com/in/christus-luo" target="_blank" rel="noreferrer" aria-label="LinkedIn">LinkedIn</a>
          <a href="#" aria-label="Douyin">Douyin</a>
          <a href="#" aria-label="RedNote">RedNote</a>
        </span>
      </nav>
      <div class="header-actions">
        <a class="pill-button connect-button" href="mailto:hello@christusluo.com">Let's Connect</a>
        <button class="pull-chain" type="button" aria-label="Pull chain to switch to dark mode" aria-pressed="false">
          <img class="chain-image" src="assets/system/chain.png" alt="" draggable="false" />
        </button>
      </div>
    </header>

    <main class="page-shell error-page">
      <section class="page-intro">
        <p class="eyebrow">404</p>
        <h1>This page wandered off.</h1>
        <p>The portfolio is still here. Head back home or jump into the work archive.</p>
        <div class="error-actions">
          <a class="pill-button dark" href="index.html">Home</a>
          <a class="pill-button light" href="index.html#work">Work</a>
        </div>
      </section>
    </main>
    <script src="script.js?v=202607211h"></script>
  </body>
</html>
