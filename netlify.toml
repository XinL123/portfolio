[build]
  publish = "."

# Canonical urls are clean and extensionless: /, /projects, /about, ...
# Any legacy .html address 301s to the clean form so the ugly url never sticks
# in the address bar (mirrors Netlify's pretty-url behaviour for real files,
# which /projects and / do not get on their own — one is a rewrite target, the
# other is the index). These 301s must come BEFORE the 200 rewrite below:
# Netlify uses first-match, and we want /projects.html -> /projects, not
# /projects.html -> index.html (which would keep the .html visible).
[[redirects]]
  from = "/projects.html"
  to = "/projects"
  status = 301

# force = true is required: /index.html is a REAL file, and Netlify skips a
# redirect whose `from` matches an existing file unless forced. (/projects.html
# needs no force — no file sits behind it.) No loop: "/" serves index.html
# internally, which is not a redirect, and the /projects 200 rewrite proxies
# index.html's bytes without re-triggering this rule.
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

# /projects is served BY THE SERVER from the home document — status 200 is a
# rewrite, not a redirect, so the address bar keeps /projects and the browser
# never sees index.html or #work. The Projects carousel is not duplicated; it
# stays in the home page as the target of the hero scroll handoff.
# Mirrors PROJECTS_ROUTES in vite.config.js — keep the two in sync.
[[redirects]]
  from = "/projects"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"

  [headers.values]
    X-Content-Type-Options = "nosniff"
