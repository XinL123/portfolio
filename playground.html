    <!-- theme boot: stamp <html data-theme> BEFORE first paint so dark mode
         never flashes white (reads the saved theme, falls back to the system) -->
    <script>
      (function () {
        try {
          /* Theme is NOT persisted: every page load (refresh or navigation)
             starts in LIGHT mode. Dark mode still toggles live via the pull-
             chain, but only for the current view — this avoids the dark-mode
             flash on the opening scroll after a refresh. */
          document.documentElement.dataset.theme = "light";
        } catch (e) {
          /* storage blocked (private mode) — keep the light default */
        }
      })();
    </script>
    <!-- fonts load in parallel with the CSS (was an @import inside styles.css,
